name: Lakehouse Architecture
description: A data architecture paradigm that combines the best features of data
  lakes and data warehouses, providing ACID transactions, schema enforcement, and
  governance on low-cost storage with support for both business intelligence and machine
  learning workloads. Effective implementation supports data-driven strategies and
  helps maintain data integrity across systems.
