name: Lakehouse Architecture
description: >-
  Lakehouse Architecture is a data architecture paradigm that combines the best
  features of data lakes and data warehouses, providing ACID transactions, schema
  enforcement, and governance on low-cost storage with support for both business
  intelligence and machine learning workloads.
